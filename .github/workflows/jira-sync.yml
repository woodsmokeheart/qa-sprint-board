name: Jira Sync

# Регулярный синк активного спринта с Jira вместо Vercel Cron.
# Дёргает защищённый эндпоинт /api/cron/sync, который запускает
# syncActiveSprintEpics() (статусы, исполнители, ретесты, тип, граф).
#
# Нужны два секрета репозитория (Settings → Secrets and variables → Actions):
#   SYNC_URL     — полный URL эндпоинта, напр. https://<app>.vercel.app/api/cron/sync
#   CRON_SECRET  — то же значение, что в env приложения

on:
  schedule:
    - cron: "*/30 * * * *" # каждые 30 минут (UTC)
  workflow_dispatch: {} # ручной запуск из вкладки Actions

# Не накладывать прогоны друг на друга, если предыдущий ещё идёт.
concurrency:
  group: jira-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Jira sync
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SYNC_URL или CRON_SECRET не заданы в секретах репозитория"
            exit 1
          fi
          curl -sS -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body
